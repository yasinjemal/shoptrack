name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-check:
    name: Release checks and bundle exports
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run release checks
        run: npm run release:check

      - name: Prove the web bundle compiles
        run: npx expo export --platform web --output-dir .expo/export-check/web

      - name: Prove the Android bundle compiles
        run: npx expo export --platform android --output-dir .expo/export-check/android
